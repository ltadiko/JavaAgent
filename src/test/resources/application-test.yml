# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  JobAgent — TEST profile (unit tests without DB)                          ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

spring:
  autoconfigure:
    exclude:
      # Spring Boot 4 reorganized packages — use correct FQCN
      - org.springframework.boot.sql.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.sql.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
      - org.springframework.boot.security.autoconfigure.oauth2.server.OAuth2AuthorizationServerAutoConfiguration
      - org.springframework.boot.security.autoconfigure.oauth2.server.OAuth2AuthorizationServerJwtAutoConfiguration
      - org.springframework.boot.security.autoconfigure.oauth2.resource.OAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.security.autoconfigure.oauth2.client.OAuth2ClientAutoConfiguration
  kafka:
    bootstrap-servers: localhost:0
    listener:
      auto-startup: false
  data:
    redis:
      host: localhost
      port: 0
  ai:
    ollama:
      enabled: false
    openai:
      enabled: false
      api-key: "not-used-in-tests"
