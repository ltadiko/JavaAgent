# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  JobAgent — TEST-CONTAINERS profile (Integration tests with Testcontainers)║
# ╚═══════════════════════════════════════════════════════════════════════════╝

spring:
  # ─── Disable services not needed for integration tests ────────────────
  # Kafka: set bootstrap-servers to a non-existing host so it doesn't try to connect
  kafka:
    bootstrap-servers: localhost:0
    consumer:
      auto-offset-reset: earliest
    listener:
      type: batch
      auto-startup: false
  # Redis/Valkey: set a non-existing port to prevent connection
  data:
    redis:
      host: localhost
      port: 0

  # JPA settings for tests
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Flyway for test database
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false

  # Spring AI — disabled for tests
  ai:
    ollama:
      enabled: false
    openai:
      enabled: false
      api-key: "not-used-in-tests"

# App settings
app:
  name: JobAgent-Test
  encryption:
    key: test-key-32-chars-for-aes-256!!
  storage:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: test-bucket

# Logging - minimal for tests
logging:
  level:
    root: WARN
    com.jobagent: INFO
    org.springframework.test: INFO
    org.testcontainers: INFO
