# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  JobAgent — TEST-CONTAINERS profile (Integration tests with Testcontainers)║
# ╚═══════════════════════════════════════════════════════════════════════════╝

spring:
  # Exclude services not needed for integration tests
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # JPA settings for tests
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Flyway for test database
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false

  # Spring AI - disabled for tests
  ai:
    ollama:
      enabled: false
    openai:
      enabled: false

# App settings
app:
  name: JobAgent-Test
  encryption:
    key: test-key-32-chars-for-aes-256!!
  storage:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: test-bucket

# Logging - minimal for tests
logging:
  level:
    root: WARN
    com.jobagent: INFO
    org.springframework.test: INFO
    org.testcontainers: INFO
